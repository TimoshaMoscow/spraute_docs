<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена — Spraute Engine</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app" style="display: block;">
        <main class="content" style="margin-left: 0; max-width: 100%;">
            <div class="error-container">
                <div class="error-icon">
                    <i class="fas fa-code-branch"></i>
                </div>
                <div class="error-code">404</div>
                <h1 class="error-title">Страница не найдена</h1>
                <p class="error-message">
                    Извините, страница, которую вы ищете, не существует или была перемещена.
                </p>
                <div class="error-buttons">
                    <a href="index.html" class="error-btn primary">
                        <i class="fas fa-home"></i>
                        На главную
                    </a>
                    <a href="getting-started.html" class="error-btn secondary">
                        <i class="fas fa-rocket"></i>
                        Начать изучение
                    </a>
                </div>
                <div class="error-suggestion" id="suggestions">
                    <i class="fas fa-lightbulb"></i>
                    Возможно, вы искали: 
                    <span id="suggestion-links"></span>
                </div>
            </div>
        </main>
    </div>

    <script>
        (function() {
            // Список всех страниц документации
            var pages = [
                { name: "Начало работы", url: "getting-started.html" },
                { name: "Синтаксис", url: "syntax.html" },
                { name: "Переменные", url: "variables.html" },
                { name: "Создание NPC", url: "npc.html" },
                { name: "UI система", url: "ui.html" },
                { name: "Кастомный чат", url: "chat-library.html" },
                { name: "Кинематографическая камера", url: "camera.html" },
                { name: "События (on)", url: "events.html" },
                { name: "Функции и await", url: "functions.html" },
                { name: "Предметы и инвентарь", url: "items.html" },
                { name: "Частицы", url: "particles.html" },
                { name: "Блоки, предметы, крафты", url: "custom-resources.html" },
                { name: "Визуальные блоки", url: "visual-blocks.html" },
                { name: "Java API", url: "java-api.html" },
                { name: "Полные примеры", url: "examples.html" }
            ];

            // Функция для перемешивания массива (алгоритм Фишера-Йетса)
            function shuffleArray(arr) {
                var shuffled = arr.slice();
                for (var i = shuffled.length - 1; i > 0; i--) {
                    var j = Math.floor(Math.random() * (i + 1));
                    var temp = shuffled[i];
                    shuffled[i] = shuffled[j];
                    shuffled[j] = temp;
                }
                return shuffled;
            }

            // Выбираем 4 случайные страницы
            var shuffledPages = shuffleArray(pages);
            var selectedPages = shuffledPages.slice(0, 4);

            // Строим ссылки
            var linksHtml = [];
            for (var i = 0; i < selectedPages.length; i++) {
                var page = selectedPages[i];
                var link = '<a href="' + page.url + '">' + page.name + '</a>';
                linksHtml.push(link);
            }

            // Вставляем в HTML через запятую с "и" перед последней
            var resultHtml = '';
            for (var i = 0; i < linksHtml.length; i++) {
                if (i === linksHtml.length - 1 && i > 0) {
                    resultHtml += ' и ' + linksHtml[i];
                } else if (i > 0) {
                    resultHtml += ', ' + linksHtml[i];
                } else {
                    resultHtml += linksHtml[i];
                }
            }

            document.getElementById('suggestion-links').innerHTML = resultHtml;
        })();
    </script>
</body>
</html>
